apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-test-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-test-app
  template:
    metadata:
      labels:
        app: java-test-app
    spec:
      containers:
      - name: java-app-container
        image: karansumathi01/java-test-app:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: java-test-service
spec:
  type: NodePort
  selector:
    app: java-test-app
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30001
